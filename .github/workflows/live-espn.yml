name: Live ESPN proxy

# GitHub runners have open internet, so they can reach ESPN even though the
# local workbench egress allow-list cannot. Each run loops for ~5 min, polling
# ESPN every ~15s and committing the moment anything outcome-affecting changes;
# the */5 cron makes runs back-to-back for ~15-30s freshness. The repo is public
# so Actions minutes are unlimited.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/live-espn.yml"
      - "scripts/fetch-espn-live.mjs"

permissions:
  contents: write

concurrency:
  group: live-espn
  cancel-in-progress: false # queue runs so they don't push over each other

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Stream ESPN live data (~5 min loop, commit on change)
        run: |
          git config user.name "live-espn-bot"
          git config user.email "actions@github.com"
          node scripts/fetch-espn-live.mjs --loop=270 --every=15
