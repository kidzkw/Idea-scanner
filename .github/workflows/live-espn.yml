name: Live ESPN proxy

# GitHub runners have open internet, so they can reach ESPN even though the
# local workbench egress allow-list historically could not. ESPN direct
# (site.api.espn.com) is now allow-listed, so the monitor reads it live and this
# proxy is a manual fallback only — kept in case the allow-list is ever revoked.
# Trigger it from the Actions tab (workflow_dispatch) to refresh the committed
# snapshot; each run loops ~5 min, polling ESPN every ~15s and committing on
# change.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/live-espn.yml"
      - "scripts/fetch-espn-live.mjs"

permissions:
  contents: write

concurrency:
  group: live-espn
  cancel-in-progress: false # queue runs so they don't push over each other

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Stream ESPN live data (~5 min loop, commit on change)
        run: |
          git config user.name "live-espn-bot"
          git config user.email "actions@github.com"
          node scripts/fetch-espn-live.mjs --loop=270 --every=15
