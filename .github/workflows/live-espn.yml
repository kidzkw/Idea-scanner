name: Live ESPN proxy

# GitHub runners have open internet, so they can reach ESPN even though the
# local workbench egress allow-list cannot. This pulls live World Cup data and
# commits it to public/data/live-espn.json, which the workbench reads via
# raw.githubusercontent.com (an allow-listed host).

on:
  schedule:
    - cron: "*/5 * * * *" # every 5 min (GitHub cron is best-effort)
  workflow_dispatch:
  # Re-run when the fetcher/workflow itself changes. Scoped so the bot's own
  # commit to live-espn.json does NOT re-trigger (no loop).
  push:
    branches: [main]
    paths:
      - ".github/workflows/live-espn.yml"
      - "scripts/fetch-espn-live.mjs"

permissions:
  contents: write

concurrency:
  group: live-espn
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fetch ESPN live data
        run: node scripts/fetch-espn-live.mjs
      - name: Commit if changed
        run: |
          git config user.name "live-espn-bot"
          git config user.email "actions@github.com"
          git add public/data/live-espn.json
          # --cached so newly-created (untracked) files are detected too.
          if git diff --cached --quiet; then
            echo "no change"
          else
            git commit -m "live: ESPN snapshot $(date -u +%FT%TZ)"
            git push
          fi
